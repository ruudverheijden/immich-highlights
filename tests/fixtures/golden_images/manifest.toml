# Golden-image benchmark manifest.
#
# Add one [[image]] block for each fixture image you want the benchmark to
# score. The evaluator runs local image analysis and scoring, then compares the
# application ranking with the personal scores and expected tiers below.
#
# Entries below were prefilled from local image analysis. Treat personal_score
# and expected_tier as starter values for any image you have not reviewed yet.

[settings]
# Requested number of top-ranked application picks considered "selected" for
# this fixture set. The evaluator caps this to the number of non-reject images
# when possible, so a small manifest does not fail only because it has too many
# reject examples.
selection_limit = 10

# Fake album name used only to label duplicate-detection report output.
album_bucket = "golden-images"

# Maximum pHash Hamming distance for reporting visually similar fixture images.
duplicate_phash_distance_threshold = 6

# Minimum share of images marked expected_tier = "accept" that must be selected.
min_top_accept_recall = 0.75

# Maximum number of images marked expected_tier = "reject" allowed in selection.
# This can be non-zero while tuning, especially when the manifest is still small.
max_reject_leak_count = 1

# Reference for fields supported in each [[image]] block:
#
# [[image]]
#
# Optional stable identifier used in reports and tests. If omitted, the image
# filename stem is used. It does not need to match the filename.
# id = "sharp_favorite_large"
#
# Required path to the fixture image, relative to this manifest file.
# file = "images/img-033.jpg"
#
# Required personal quality/preference score on a 0-100 scale. This is reported
# as correlation context, but pass/fail checks are based on expected_tier.
# personal_score = 96
#
# Optional broad expectation for selection checks. If omitted, the tier defaults
# to "neutral". Current useful tiers are "accept", "neutral", and "reject".
# expected_tier = "accept"
#
# Optional synthetic Immich-like asset metadata used by semantic scoring.
# [image.metadata]
# isFavourite = true
# isEdited = true
#
# Optional EXIF-like metadata consumed by scoring helpers.
# [image.metadata.exif]
# rating = 5
# ISO = 100
# ExposureTime = "1/500"
# latitude = 52.37
# longitude = 4.90
#
# Optional Immich-style face boxes, in original image coordinates, used for face
# count and face-quality scoring.
# [[image.faces]]
# boundingBoxX1 = 100
# boundingBoxY1 = 120
# boundingBoxX2 = 260
# boundingBoxY2 = 300
# imageWidth = 1200
# imageHeight = 900
#
# Optional content-filter penalty and match details. Use these when a fixture
# should behave as if Immich smart search matched an unwanted content filter.
# content_filter_penalty = -40
#
# [[image.content_filter_matches]]
# label = "screenshot"
# query = "screenshot"
# penalty = -40
# rank = 1


