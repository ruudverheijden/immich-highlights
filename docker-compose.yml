version: '3.8'
services:
  photo-scorer:
    build: .
    environment:
      IMMICH_API_URL: http://192.168.1.100:2283
      IMMICH_API_KEY: ${IMMICH_API_KEY}
      SCORER_DRY_RUN: ${SCORER_DRY_RUN:-true}
      SCORER_SCAN_INTERVAL_HOURS: 24
      SCORER_DB_PATH: /app/db/scorer.db
      SCORER_ALBUM_CONFIG_PATH: /app/albums.toml
      SCORER_CONTENT_FILTER_CONFIG_PATH: /app/content_filters.toml
      SCORER_SCORING_CONFIG_PATH: /app/scoring.toml
      TZ: UTC
    volumes:
      - ./db:/app/db
      - ./log:/app/log
      - /tmp/scorer:/tmp/scorer
      # Optional: copy albums.toml.example to albums.toml and uncomment this
      # line to customize generated albums without rebuilding the image.
      # - ./albums.toml:/app/albums.toml:ro
      # Optional: copy content_filters.toml.example to content_filters.toml and
      # uncomment this line to override the default content filters.
      # - ./content_filters.toml:/app/content_filters.toml:ro
      # Optional: copy scoring.toml.example to scoring.toml and uncomment this
      # line to tune scoring weights without rebuilding the image.
      # - ./scoring.toml:/app/scoring.toml:ro
    restart: unless-stopped
